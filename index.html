<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi TV</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.05), 0 1px 4px rgba(0, 0, 0, 0.03);
            --shadow-elevated: 0 8px 30px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f8fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--gray-800);
            line-height: 1.5;
        }

        /* Contenedor principal (dashboard) */
        .app-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: none;
            animation: fadeSlideIn 0.5s ease;
        }

        .app-container.active {
            display: block;
        }

        /* Login */
        .login-container {
            background: #ffffff;
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--gray-200);
            animation: fadeSlideIn 0.4s ease;
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 32px;
            font-size: 2.4rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 28px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
        }

        .login-tab {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: none;
            color: var(--gray-500);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all var(--transition);
            position: relative;
        }

        .login-tab.active {
            background: var(--primary);
            color: #ffffff;
            font-weight: 600;
            border-radius: var(--radius-sm);
        }

        .login-tab:hover:not(.active) {
            background: rgba(0,0,0,0.03);
            color: var(--gray-700);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--gray-600);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gray-300);
            background: var(--gray-50);
            color: var(--gray-800);
            font-size: 1rem;
            transition: all var(--transition);
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: #ffffff;
        }

        .form-group input::placeholder {
            color: var(--gray-400);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            margin-top: 12px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #dc2626;
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
            font-weight: 500;
            background: #fef2f2;
            border-radius: 8px;
            padding: 8px;
            display: none;
        }

        .error-msg:not(:empty) {
            display: block;
        }

        /* Dashboard */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .welcome-card {
            background: #ffffff;
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .welcome-greeting {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
        }

        .welcome-text h2 {
            color: var(--gray-800);
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.3;
            max-width: 500px;
        }

        .welcome-text h2 strong {
            color: var(--primary);
            font-weight: 700;
        }

        .datetime {
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: var(--gray-500);
            font-size: 0.95rem;
            align-items: flex-end;
        }

        .datetime .date {
            font-weight: 500;
            color: var(--gray-700);
        }

        .datetime .time {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .logout-btn {
            padding: 10px 20px;
            background: #ffffff;
            border: 1px solid var(--gray-300);
            color: var(--gray-600);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition);
            align-self: flex-start;
            white-space: nowrap;
        }

        .logout-btn:hover {
            background: var(--gray-100);
            border-color: var(--gray-400);
            color: var(--gray-800);
        }

        /* Burbuja de texto mejorada */
        .speech-bubble {
            background: #ffffff;
            border-radius: var(--radius);
            padding: 28px 32px;
            border-left: 5px solid var(--primary);
            box-shadow: var(--shadow-card);
            position: relative;
            border: 1px solid var(--gray-200);
            border-left: 5px solid var(--primary);
            transition: all var(--transition);
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 32px;
            width: 20px;
            height: 20px;
            background: #ffffff;
            border-left: 1px solid var(--gray-200);
            border-top: 1px solid var(--gray-200);
            transform: rotate(45deg);
            border-radius: 2px;
        }

        .speech-bubble p {
            color: var(--gray-700);
            font-size: 1rem;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        /* Animaciones */
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .login-container {
                padding: 28px 24px;
            }
            .welcome-card {
                padding: 20px 24px;
            }
            .welcome-text h2 {
                font-size: 1.3rem;
            }
            .datetime {
                align-items: flex-start;
                margin-top: 8px;
            }
            .speech-bubble {
                padding: 20px 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Login / Registro -->
    <div id="loginContainer" class="login-container">
        <h1>Mi TV</h1>
        <div class="login-tabs">
            <button class="login-tab active" onclick="switchTab('login')">Iniciar Sesión</button>
            <button class="login-tab" onclick="switchTab('register')">Crear Usuario</button>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="loginUser" placeholder="Ingresa tu usuario" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPass" placeholder="Ingresa tu contraseña" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Ingresar</button>
        </form>

        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="regUser" placeholder="Elige un nombre de usuario" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPass" placeholder="Crea una contraseña segura" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn">Crear Usuario</button>
        </form>

        <div id="errorMsg" class="error-msg"></div>
    </div>

    <!-- Dashboard principal -->
    <div id="appContainer" class="app-container">
        <div class="main-content">
            <div class="welcome-card">
                <div class="welcome-greeting">
                    <div class="welcome-text">
                        <h2 id="welcomeTitle"></h2>
                    </div>
                    <div class="datetime">
                        <span class="date" id="dateDisplay"></span>
                        <span class="time" id="timeDisplay"></span>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>

            <div class="speech-bubble">
                <p id="bubbleText">Cargando mensaje...</p>
            </div>
        </div>
    </div>

    <script>
        const USERS_KEY = 'mitv_users';
        const SESSION_KEY = 'mitv_session';

        function getUsers() {
            const users = localStorage.getItem(USERS_KEY);
            return users ? JSON.parse(users) : [];
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function getSession() {
            const session = localStorage.getItem(SESSION_KEY);
            return session ? JSON.parse(session) : null;
        }

        function saveSession(username) {
            localStorage.setItem(SESSION_KEY, JSON.stringify({ username }));
        }

        function clearSession() {
            localStorage.removeItem(SESSION_KEY);
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.login-tab');
            tabs.forEach(t => t.classList.remove('active'));
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const errorEl = document.getElementById('errorMsg');

            if (tab === 'login') {
                tabs[0].classList.add('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
            errorEl.textContent = '';
            // Limpiar campos
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('regUser').value = '';
            document.getElementById('regPass').value = '';
        }

        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username || !password) {
                errorEl.textContent = 'Completa todos los campos.';
                return;
            }

            if (password.length < 4) {
                errorEl.textContent = 'La contraseña debe tener al menos 4 caracteres.';
                return;
            }

            const users = getUsers();
            if (users.find(u => u.username === username)) {
                errorEl.textContent = 'El usuario ya existe. Elige otro nombre.';
                return;
            }

            users.push({ username, password });
            saveUsers(users);
            saveSession(username);
            showDashboard(username);
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username || !password) {
                errorEl.textContent = 'Completa todos los campos.';
                return;
            }

            const users = getUsers();
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) {
                errorEl.textContent = 'Usuario o contraseña incorrectos.';
                return;
            }

            saveSession(username);
            showDashboard(username);
        }

        function showDashboard(username) {
            document.getElementById('loginContainer').style.display = 'none';
            const appContainer = document.getElementById('appContainer');
            appContainer.classList.add('active');
            // Configurar bienvenida
            document.getElementById('welcomeTitle').innerHTML =
                `<strong>${username}</strong>, le damos la bienvenida a su televisor, escoja qué canal quiere ver en el menú de la aplicación.`;
            updateDateTime();
            setInterval(updateDateTime, 1000);
            loadBubbleText();
        }

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('es-ES', options);
            const timeStr = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('dateDisplay').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('timeDisplay').textContent = timeStr;
        }

        async function loadBubbleText() {
            const bubble = document.getElementById('bubbleText');
            try {
                const response = await fetch('https://tecnobum.github.io/MiTV/nota.txt');
                if (!response.ok) throw new Error('No se pudo cargar');
                const text = await response.text();
                bubble.textContent = text;
            } catch (error) {
                bubble.textContent = 'No se pudo cargar el mensaje en este momento.';
            }
        }

        function logout() {
            if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
                clearSession();
                document.getElementById('appContainer').classList.remove('active');
                document.getElementById('loginContainer').style.display = 'block';
                document.getElementById('loginUser').value = '';
                document.getElementById('loginPass').value = '';
                document.getElementById('errorMsg').textContent = '';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const session = getSession();
            if (session && session.username) {
                const users = getUsers();
                if (users.find(u => u.username === session.username)) {
                    showDashboard(session.username);
                    return;
                } else {
                    clearSession();
                }
            }
            document.getElementById('loginContainer').style.display = 'block';
        });
    </script>
</body>
</html>
