<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e293b;
        }

        /* Contenedor principal */
        .app-container {
            width: 100%;
            max-width: 900px;
            margin: 20px;
            display: none;
        }

        .app-container.active {
            display: block;
        }

        /* Login */
        .login-container {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
            color: #1a56db;
            font-weight: 700;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 25px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #cbd5e1;
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            background: #f8fafc;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            font-weight: 500;
        }

        .login-tab.active {
            background: #1a56db;
            color: #ffffff;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #334155;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #1e293b;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #1a56db;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1e40af;
        }

        .error-msg {
            color: #dc2626;
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        /* Dashboard */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .welcome-bar {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .welcome-text h2 {
            color: #0f172a;
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .welcome-text p {
            color: #475569;
            font-size: 0.9rem;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #475569;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            align-self: flex-start;
        }

        .logout-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .speech-bubble {
            background: #ffffff;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 30px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 12px solid #ffffff;
            filter: drop-shadow(0 -1px 0 #e2e8f0);
        }

        .speech-bubble p {
            color: #334155;
            font-size: 1rem;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .welcome-bar {
                padding: 15px;
            }

            .welcome-text h2 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Login / Registro -->
    <div id="loginContainer" class="login-container">
        <h1>Mi TV</h1>
        <div class="login-tabs">
            <button class="login-tab active" onclick="switchTab('login')">Iniciar Sesion</button>
            <button class="login-tab" onclick="switchTab('register')">Crear Usuario</button>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="loginUser" placeholder="Tu usuario" required>
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" id="loginPass" placeholder="Tu contrasena" required>
            </div>
            <button type="submit" class="btn">Ingresar</button>
        </form>

        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="regUser" placeholder="Elige un usuario" required>
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" id="regPass" placeholder="Elige una contrasena" required>
            </div>
            <button type="submit" class="btn">Crear Usuario</button>
        </form>

        <div id="errorMsg" class="error-msg"></div>
    </div>

    <!-- Dashboard principal -->
    <div id="appContainer" class="app-container">
        <div class="main-content">
            <div class="welcome-bar">
                <div class="welcome-text">
                    <h2 id="welcomeTitle"></h2>
                    <p id="dateTime"></p>
                </div>
                <button class="logout-btn" onclick="logout()">Cerrar Sesion</button>
            </div>

            <!-- Burbuja de texto con el mensaje descargado -->
            <div class="speech-bubble">
                <p id="bubbleText">Cargando...</p>
            </div>
        </div>
    </div>

    <script>
        const USERS_KEY = 'mitv_users';
        const SESSION_KEY = 'mitv_session';

        function getUsers() {
            const users = localStorage.getItem(USERS_KEY);
            return users ? JSON.parse(users) : [];
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function getSession() {
            const session = localStorage.getItem(SESSION_KEY);
            return session ? JSON.parse(session) : null;
        }

        function saveSession(username) {
            localStorage.setItem(SESSION_KEY, JSON.stringify({ username }));
        }

        function clearSession() {
            localStorage.removeItem(SESSION_KEY);
        }

        function switchTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.login-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.querySelector('.login-tab:nth-child(2)').classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
            document.getElementById('errorMsg').textContent = '';
        }

        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username || !password) {
                errorEl.textContent = 'Completa todos los campos.';
                return;
            }

            const users = getUsers();
            if (users.find(u => u.username === username)) {
                errorEl.textContent = 'El usuario ya existe. Elige otro nombre.';
                return;
            }

            users.push({ username, password });
            saveUsers(users);
            saveSession(username);
            showDashboard(username);
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username || !password) {
                errorEl.textContent = 'Completa todos los campos.';
                return;
            }

            const users = getUsers();
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) {
                errorEl.textContent = 'Usuario o contrasena incorrectos.';
                return;
            }

            saveSession(username);
            showDashboard(username);
        }

        function showDashboard(username) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            document.getElementById('welcomeTitle').textContent =
                `${username} Le damos la bienvenida a su televisor, escoja que canal quiere ver en el menú de la aplicación.`;
            updateDateTime();
            setInterval(updateDateTime, 1000);
            loadBubbleText();
        }

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('es-ES', options);
            const timeStr = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('dateTime').textContent = `Hoy es ${dateStr} y son las ${timeStr}`;
        }

        async function loadBubbleText() {
            try {
                const response = await fetch('https://tecnobum.github.io/MiTV/nota.txt');
                if (!response.ok) throw new Error('No se pudo cargar');
                const text = await response.text();
                document.getElementById('bubbleText').textContent = text;
            } catch (error) {
                document.getElementById('bubbleText').textContent = 'No se pudo cargar el mensaje.';
            }
        }

        function logout() {
            clearSession();
            document.getElementById('appContainer').classList.remove('active');
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('errorMsg').textContent = '';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const session = getSession();
            if (session && session.username) {
                const users = getUsers();
                if (users.find(u => u.username === session.username)) {
                    showDashboard(session.username);
                    return;
                } else {
                    clearSession();
                }
            }
            document.getElementById('loginContainer').style.display = 'block';
        });
    </script>
</body>
</html>
