<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e293b;
        }

        /* Contenedor principal */
        .app-container {
            width: 100%;
            max-width: 1100px;
            min-height: 90vh;
            margin: 20px;
            display: none;
        }

        .app-container.active {
            display: flex;
            gap: 20px;
        }

        /* Login */
        .login-container {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
            color: #1a56db;
            font-weight: 700;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 25px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #cbd5e1;
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            background: #f8fafc;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            font-weight: 500;
        }

        .login-tab.active {
            background: #1a56db;
            color: #ffffff;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #334155;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #1e293b;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #1a56db;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1e40af;
        }

        .error-msg {
            color: #dc2626;
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        /* Dashboard */
        .sidebar {
            width: 230px;
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar h3 {
            color: #1a56db;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .channel-btn {
            padding: 10px 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            color: #334155;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .channel-btn:hover {
            background: #e0e7ff;
            border-color: #1a56db;
        }

        .channel-btn.active {
            background: #1a56db;
            color: white;
            border-color: #1a56db;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .welcome-bar {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-text h2 {
            color: #0f172a;
            margin-bottom: 4px;
            font-size: 1.3rem;
        }

        .welcome-text p {
            color: #475569;
            font-size: 0.9rem;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #475569;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .tv-screen {
            flex: 1;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 280px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .tv-screen .channel-display {
            text-align: center;
        }

        .tv-screen .channel-display h3 {
            font-size: 1.8rem;
            color: #1a56db;
            font-weight: 600;
        }

        .tv-screen .channel-display p {
            color: #64748b;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .speech-bubble {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 30px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 12px solid #ffffff;
            filter: drop-shadow(0 -1px 0 #e2e8f0);
        }

        .speech-bubble p {
            color: #334155;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .app-container.active {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
                padding: 15px;
            }

            .sidebar h3 {
                width: 100%;
                text-align: center;
            }

            .welcome-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Login / Registro -->
    <div id="loginContainer" class="login-container">
        <h1>Mi TV</h1>
        <div class="login-tabs">
            <button class="login-tab active" onclick="switchTab('login')">Iniciar Sesion</button>
            <button class="login-tab" onclick="switchTab('register')">Crear Usuario</button>
        </div>

        <!-- Formulario de Inicio de Sesión -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="loginUser" placeholder="Tu usuario" required>
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" id="loginPass" placeholder="Tu contrasena" required>
            </div>
            <button type="submit" class="btn">Ingresar</button>
        </form>

        <!-- Formulario de Registro -->
        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="regUser" placeholder="Elige un usuario" required>
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" id="regPass" placeholder="Elige una contrasena" required>
            </div>
            <button type="submit" class="btn">Crear Usuario</button>
        </form>

        <div id="errorMsg" class="error-msg"></div>
    </div>

    <!-- Dashboard principal -->
    <div id="appContainer" class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h3>Canales</h3>
            <button class="channel-btn active" onclick="changeChannel('Canal de las Estrellas')">Canal de las Estrellas</button>
            <button class="channel-btn" onclick="changeChannel('Canal 5')">Canal 5</button>
            <button class="channel-btn" onclick="changeChannel('Azteca 7')">Azteca 7</button>
            <button class="channel-btn" onclick="changeChannel('Canal 11')">Canal 11</button>
            <button class="channel-btn" onclick="changeChannel('ESPN')">ESPN</button>
            <button class="channel-btn" onclick="changeChannel('Discovery')">Discovery</button>
        </div>

        <!-- Contenido principal -->
        <div class="main-content">
            <div class="welcome-bar">
                <div class="welcome-text">
                    <h2 id="welcomeTitle">Bienvenido</h2>
                    <p id="dateTime"></p>
                </div>
                <button class="logout-btn" onclick="logout()">Cerrar Sesion</button>
            </div>

            <!-- Pantalla TV -->
            <div class="tv-screen">
                <div class="channel-display">
                    <h3 id="currentChannel">Canal de las Estrellas</h3>
                    <p>Estas viendo este canal</p>
                </div>
            </div>

            <!-- Burbuja de texto -->
            <div class="speech-bubble">
                <p id="bubbleText">Cargando...</p>
            </div>
        </div>
    </div>

    <script>
        const USERS_KEY = 'mitv_users';
        const SESSION_KEY = 'mitv_session';

        function getUsers() {
            const users = localStorage.getItem(USERS_KEY);
            return users ? JSON.parse(users) : [];
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function getSession() {
            const session = localStorage.getItem(SESSION_KEY);
            return session ? JSON.parse(session) : null;
        }

        function saveSession(username) {
            localStorage.setItem(SESSION_KEY, JSON.stringify({ username }));
        }

        function clearSession() {
            localStorage.removeItem(SESSION_KEY);
        }

        function switchTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.login-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.querySelector('.login-tab:nth-child(2)').classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
            document.getElementById('errorMsg').textContent = '';
        }

        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username || !password) {
                errorEl.textContent = 'Completa todos los campos.';
                return;
            }

            const users = getUsers();
            if (users.find(u => u.username === username)) {
                errorEl.textContent = 'El usuario ya existe. Elige otro nombre.';
                return;
            }

            users.push({ username, password });
            saveUsers(users);
            saveSession(username);
            showDashboard(username);
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username || !password) {
                errorEl.textContent = 'Completa todos los campos.';
                return;
            }

            const users = getUsers();
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) {
                errorEl.textContent = 'Usuario o contrasena incorrectos.';
                return;
            }

            saveSession(username);
            showDashboard(username);
        }

        function showDashboard(username) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            document.getElementById('welcomeTitle').textContent = `Bienvenido ${username} a Tu TV`;
            updateDateTime();
            setInterval(updateDateTime, 1000);
            loadBubbleText();
            changeChannel('Canal de las Estrellas');
        }

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('es-ES', options);
            const timeStr = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('dateTime').textContent = `Hoy es ${dateStr} y son las ${timeStr}`;
        }

        function changeChannel(channelName) {
            document.getElementById('currentChannel').textContent = channelName;
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            // Encuentra el botón que corresponde al canal y lo activa
            const buttons = document.querySelectorAll('.channel-btn');
            buttons.forEach(btn => {
                if (btn.textContent.trim() === channelName) {
                    btn.classList.add('active');
                }
            });
        }

        async function loadBubbleText() {
            try {
                const response = await fetch('https://tecnobum.github.io/MiTV/nota.txt');
                if (!response.ok) throw new Error('No se pudo cargar');
                const text = await response.text();
                document.getElementById('bubbleText').textContent = text;
            } catch (error) {
                document.getElementById('bubbleText').textContent = 'No se pudo cargar el mensaje.';
            }
        }

        function logout() {
            clearSession();
            document.getElementById('appContainer').classList.remove('active');
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('errorMsg').textContent = '';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const session = getSession();
            if (session && session.username) {
                const users = getUsers();
                if (users.find(u => u.username === session.username)) {
                    showDashboard(session.username);
                    return;
                } else {
                    clearSession();
                }
            }
            document.getElementById('loginContainer').style.display = 'block';
        });
    </script>
</body>
</html>
